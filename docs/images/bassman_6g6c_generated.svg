<title>Generated matching circuit for the Fender Bassman 6G6-C</title>
<desc>Synthesized signal-path schematic: two input channels feed a 7025 preamp, a Bass/Treble/Presence tone stack, a 7025 phase inverter, a push-pull pair of 5881 power tubes, output transformer 125A13A, and an 8-ohm speaker. A separate power-supply chain runs from the 117 VAC inlet through power transformer 125P7A, a solid-state silicon rectifier, choke 125C1A, and filter caps to a B-plus high-tension bus. Provenance: 6G6 family, genuine but modified.</desc>
