# Vintage dating reference tables. Extend the data; don't hard-code in Python.

# EIA source codes (first 3 digits of a date-stamped part) for vendors most
# relevant to 1960s Fender amps.
eia_source_codes:
  "606": "Schumacher"   # Fender's primary transformer supplier
  "137": "CTS"          # potentiometers, speakers
  "304": "Stackpole"    # pots, carbon-comp resistors
  "274": "Jensen"       # speakers

# How to read the tail of an EIA stamp in 1960s context.
eia_stamp_format:
  description: >
    SSSYWW or SSSYYWW — three source digits, then year and week. Single-digit
    year is interpreted within the 1960s decade (e.g. '6' => 1966). Example:
    '606-341' => Schumacher (606), 1963 (3), week 41 (... format varies by vendor).

# Construction cues that date / authenticate a chassis (qualitative, for the
# genuine-vs-clone axis).
construction_cues:
  period_correct_caps: ["Astron", "Good-All", "Cornell-Dubilier", "molded paper"]
  period_correct_resistors: ["carbon composition", "Stackpole", "Allen-Bradley"]
  service_replacement_caps: ["Sprague Atom", "Nichicon", "F&T", "modern Vishay"]
  wire: "cloth-covered push-back (yellow/tan) is correct for the era"
  replaceable_parts: ["filter caps", "coupling caps", "power transformer", "output transformer", "choke", "tubes"]
  provenance_note: >
    Transformers, filter/coupling caps and tubes are commonly replaced in service.
    Non-OE (aftermarket) transformer part-number stamps are NOT provenance evidence
    — they reflect a re-transformer, not the amp's origin. Date the amp from chassis
    stamps, pot date codes, and surviving original-part date codes instead.

# Fender model serial-number prefixes (brown/blonde/blackface piggyback era).
# A chassis serial identifies the MODEL, not a precise year — Fender serials were
# not strictly sequential, so date the build from the tube chart or the iron.
serial_prefixes:
  "BP": "Bassman Piggyback"     # e.g. BP11840 on this chassis

# Fender tube-chart 2-letter date code (stamped 1953-1967): 1st letter = year,
# 2nd letter = month (A=Jan .. L=Dec). Full year scheme starts A=1951.
tube_chart_date_codes:
  note: "1st letter = year, 2nd letter = month (A=Jan..L=Dec)."
  years: {J: 1960, K: 1961, L: 1962, M: 1963, N: 1964, O: 1965, P: 1966, Q: 1967}
